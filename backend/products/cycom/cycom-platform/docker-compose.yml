version: "3.8"

services:
  db:
    image: postgres:16
    container_name: cycom-db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: ${POSTGRES_USER:-cycom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cycom}
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cycom}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  cycom:
    image: cycom:19
    container_name: cycom-cycom
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8069:8069"
      - "8072:8072"  # longpolling / chat
    environment:
      HOST: db
      USER: ${POSTGRES_USER:-cycom}
      PASSWORD: ${POSTGRES_PASSWORD:-cycom}
    volumes:
      - ./cycom-data:/var/lib/cycom
      - ./config:/etc/cycom
      - ./addons:/mnt/extra-addons
      - ./cycom-source:/mnt/cycom-source
    command: ["cycom", "-c", "/etc/cycom/cycom.conf"]
    restart: unless-stopped
