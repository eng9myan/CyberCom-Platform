name: Terraform

on:
  pull_request:
    branches: [main, develop, staging]
    paths: ["infrastructure/terraform/**"]
  push:
    branches: [main]
    paths: ["infrastructure/terraform/**"]
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

env:
  TF_VERSION: "1.7.5"

jobs:

  lint:
    name: Terraform Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Format
        run: |
          if find infrastructure/terraform -name "*.tf" | grep -q .; then
            terraform fmt -check -recursive infrastructure/terraform/ || true
          else
            echo "No TF files yet"
          fi
      - name: Checkov IaC scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infrastructure/terraform/
          soft_fail: true

  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == "pull_request"
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Configure OCI
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem
          printf "[DEFAULT]\nuser=%s\nfingerprint=%s\ntenancy=%s\nregion=il-jerusalem-1\nkey_file=~/.oci/oci_api_key.pem\n" \
            "${{ secrets.OCI_USER_OCID }}" \
            "${{ secrets.OCI_FINGERPRINT }}" \
            "${{ secrets.OCI_TENANCY_OCID }}" > ~/.oci/config
      - name: Plan
        run: |
          cd infrastructure/terraform
          if [ -f main.tf ]; then
            terraform init -backend=false
            terraform plan -no-color || true
          else
            echo "No TF yet - skipping plan"
          fi

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == "push" && github.ref == "refs/heads/main"
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Apply
        run: |
          cd infrastructure/terraform
          if [ -f main.tf ]; then
            terraform init && terraform apply -auto-approve
          else
            echo "No TF yet"
          fi
terraform.yml
