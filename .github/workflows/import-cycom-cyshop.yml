name: Import CyCom ERP and CyShop

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "import" to run the subtree import into backend/products/'
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  import:
    if: github.event.inputs.confirm == 'import'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout CyberCom-Platform
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create import branch
        run: git checkout -b feat/import-cycom-erp-cyshop

      - name: Verify git subtree is available
        run: git subtree --help > /dev/null

      - name: Import CyCom ERP via git subtree (preserves full history)
        run: |
          git remote add cycom-src https://github.com/eng9myan/CyCom.git
          git fetch cycom-src main
          git subtree add --prefix=backend/products/cycom cycom-src main --squash=false -m "feat(cycom): import CyCom ERP (Odoo + Next.js wizard UI)"
          git remote remove cycom-src

      - name: Import CyShop via git subtree (preserves full history)
        run: |
          git remote add cyshop-src https://github.com/eng9myan/Cyshop.git
          git fetch cyshop-src main
          git subtree add --prefix=backend/products/cyshop cyshop-src main --squash=false -m "feat(cyshop): import CyShop (Django + Next.js + Vite)"
          git remote remove cyshop-src

      - name: Extend .gitignore for imported products
        run: |
          {
            echo ""
            echo "# --- Imported CyCom ERP / CyShop build artifacts ---"
            echo "backend/products/cycom/**/node_modules/"
            echo "backend/products/cycom/**/.next/"
            echo "backend/products/cycom/**/__pycache__/"
            echo "backend/products/cycom/**/*.pyc"
            echo "backend/products/cycom/**/filestore/"
            echo "backend/products/cyshop/**/node_modules/"
            echo "backend/products/cyshop/**/.next/"
            echo "backend/products/cyshop/**/dist/"
            echo "backend/products/cyshop/**/__pycache__/"
            echo "backend/products/cyshop/**/*.pyc"
          } >> .gitignore
          git add .gitignore
          git commit -m "chore: extend .gitignore for imported cycom/cyshop products" --allow-empty

      - name: Full-history secret scan (gitleaks)
        continue-on-error: true
        run: |
          docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:latest detect \
            --source /repo \
            --report-format json \
            --report-path /repo/gitleaks-report.json \
            --no-banner || true
          echo "GITLEAKS_FINDINGS=$([ -f gitleaks-report.json ] && jq 'length' gitleaks-report.json || echo 0)" >> "$GITHUB_ENV"

      - name: Upload gitleaks report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          if-no-files-found: ignore

      - name: Push import branch
        run: git push -u origin feat/import-cycom-erp-cyshop

      - name: Open pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          : > /tmp/pr-body.md
          echo '## Automated import via git subtree' >> /tmp/pr-body.md
          echo '' >> /tmp/pr-body.md
          echo 'Merges two existing product repositories into this monorepo as self-contained, independently-buildable subdirectories, preserving full upstream commit history (`--squash=false`).' >> /tmp/pr-body.md
          echo '' >> /tmp/pr-body.md
          echo '- `backend/products/cycom/` <- `eng9myan/CyCom` (branch `main`) - Odoo 19 + Postgres 16 backend, 75+ custom addons, Next.js setup-wizard UI' >> /tmp/pr-body.md
          echo '- `backend/products/cyshop/` <- `eng9myan/Cyshop` (branch `main`) - Django 6 + DRF + GraphQL backend, Next.js 14 + Vite frontends' >> /tmp/pr-body.md
          echo '' >> /tmp/pr-body.md
          echo '## Secret scan' >> /tmp/pr-body.md
          echo '' >> /tmp/pr-body.md
          echo "A full-history gitleaks scan ran during this workflow. Findings count: \`${GITLEAKS_FINDINGS}\`. See the \`gitleaks-report\` workflow artifact for details before merging. If findings > 0, **do not merge** until reviewed." >> /tmp/pr-body.md
          echo '' >> /tmp/pr-body.md
          echo '## Open questions for review' >> /tmp/pr-body.md
          echo '' >> /tmp/pr-body.md
          echo '- `backend/products/cycom/cycom-backend.archive/` (an unused, archived FastAPI backend) was imported as-is. Confirm whether to drop it in a follow-up cleanup.' >> /tmp/pr-body.md
          echo '- `.gitignore` was extended for both products common build artifacts - review for anything product-specific still missing.' >> /tmp/pr-body.md
          echo '' >> /tmp/pr-body.md
          echo 'Triggered manually via `workflow_dispatch`.' >> /tmp/pr-body.md
          gh pr create \
            --base main \
            --head feat/import-cycom-erp-cyshop \
            --title "Import CyCom ERP and CyShop as platform product modules" \
            --body-file /tmp/pr-body.md
