version: "3.8"

# CyberCom Platform — Local Development Stack
# ADR-0001, ADR-0009, ADR-0005
# Run: docker compose up -d

services:
  # ── Database ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cybercom-postgres
    environment:
      POSTGRES_DB: cybercom_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cache ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cybercom-redis
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Kafka (KRaft mode — no Zookeeper) ────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: cybercom-kafka
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Identity (Keycloak) ─────────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: cybercom-keycloak
    command: start-dev --import-realm
    ports:
      - "8080:8080"
    environment:
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8080
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HEALTH_ENABLED: "true"
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - keycloak_data:/opt/keycloak/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080; echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; timeout 5 cat <&3 | grep -q 'UP'"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 60s

  # ── OTel Collector ──────────────────────────────────────────────────────
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.99.0
    container_name: cybercom-otel-collector
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports:
      - "4317:4317"   # gRPC
      - "4318:4318"   # HTTP
      - "8888:8888"   # Metrics
    volumes:
      - ./infrastructure/observability/otel-collector.yaml:/etc/otelcol-contrib/config.yaml:ro

  # ── Prometheus ──────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: cybercom-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"

  # ── Grafana ─────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: cybercom-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  # ── Backend (Django) ────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: infrastructure/Dockerfile.backend
    container_name: cybercom-backend
    ports:
      - "8000:8000"
    environment:
      DJANGO_SECRET_KEY: dev-secret-key-not-for-production-use-1234567890
      DJANGO_DEBUG: "True"
      DB_HOST: postgres
      DB_NAME: cybercom_dev
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      CYIDENTITY_ISSUER: http://keycloak:8080/realms/cybercom
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      OTEL_SERVICE_NAME: cybercom-backend
      ENVIRONMENT: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app:ro

  # ── Celery Worker ───────────────────────────────────────────────────────
  celery-worker:
    build:
      context: .
      dockerfile: infrastructure/Dockerfile.backend
    container_name: cybercom-celery
    command: ["celery", "-A", "core", "worker", "--loglevel=info", "--concurrency=4"]
    environment:
      DJANGO_SECRET_KEY: dev-secret-key-not-for-production-use-1234567890
      DJANGO_DEBUG: "True"
      DB_HOST: postgres
      DB_NAME: cybercom_dev
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - backend

  # ── Celery Beat (periodic tasks — idle-timeout enforcement, hybrid tax
  #    sync retry, etc.) ────────────────────────────────────────────────────
  celery-beat:
    build:
      context: .
      dockerfile: infrastructure/Dockerfile.backend
    container_name: cybercom-celery-beat
    command: ["celery", "-A", "core", "beat", "--loglevel=info"]
    environment:
      DJANGO_SECRET_KEY: dev-secret-key-not-for-production-use-1234567890
      DJANGO_DEBUG: "True"
      DB_HOST: postgres
      DB_NAME: cybercom_dev
      DB_USER: postgres
      DB_PASSWORD: postgres
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      - backend

  # ── Frontend (Next.js) ───────────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: infrastructure/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: cybercom-frontend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    depends_on:
      - backend

volumes:
  pgdata:
  keycloak_data:
  prometheus_data:
  grafana_data:
