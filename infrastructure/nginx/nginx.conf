# CyberCom Revolution - Nginx Config for all 12 domains
# OCI VM: 158.178.130.4 | Region: il-jerusalem-1
# Place at: /etc/nginx/conf.d/cybercom.conf

limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=general:10m rate=100r/m;

server {
    listen 80;
    server_name cy-com.com www.cy-com.com;
    return 301 https://www.cy-com.com$request_uri;
}
server {
    listen 443 ssl;
    http2 on;
    server_name www.cy-com.com cy-com.com;
    ssl_certificate /etc/letsencrypt/live/www.cy-com.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.cy-com.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    root /var/www/cy-com.com;
    index index.html;
    location / { try_files $uri $uri/ =404; }
    location ~* \.(css|js|jpg|png|svg|ico|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
    location ~ /.well-known/acme-challenge { allow all; root /var/www/certbot; }
}

server {
    listen 80;
    server_name api.cy-com.com;
    return 301 https://api.cy-com.com$request_uri;
}
server {
    listen 443 ssl;
    http2 on;
    server_name api.cy-com.com;
    ssl_certificate /etc/letsencrypt/live/api.cy-com.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.cy-com.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options nosniff always;
    add_header Access-Control-Allow-Origin "https://www.cy-com.com" always;
    add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
    add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;
    location /health { proxy_pass http://127.0.0.1:8000/health; access_log off; }
    location / {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 60s;
    }
    location ~ /.well-known/acme-challenge { allow all; root /var/www/certbot; }
}

server {
    listen 80;
    server_name health.cy-com.com provider.cy-com.com hospital.cy-com.com
                clinic.cy-com.com lab.cy-com.com imaging.cy-com.com
                pharmacy.cy-com.com portal.cy-com.com partners.cy-com.com
                docs.cy-com.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name health.cy-com.com;
    ssl_certificate /etc/letsencrypt/live/health.cy-com.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/health.cy-com.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    add_header Strict-Transport-Security "max-age=31536000" always;
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
