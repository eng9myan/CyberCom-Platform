# ArgoCD Application — CyberCom Platform (dev environment). ADR-0010 (GitOps).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cybercom-platform-dev
  namespace: argocd
  labels:
    cybercom.io/environment: development
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: cybercom

  source:
    repoURL: https://github.com/eng9myan/CyberCom-Platform
    targetRevision: develop
    path: infrastructure/kubernetes/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: cybercom-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  revisionHistoryLimit: 10

  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
