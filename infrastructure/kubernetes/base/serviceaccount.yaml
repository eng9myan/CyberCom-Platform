apiVersion: v1
kind: ServiceAccount
metadata:
  name: cybercom-backend
  namespace: cybercom
  labels:
    app.kubernetes.io/name: cybercom-backend
    app.kubernetes.io/component: backend
  annotations:
    # Vault auth via K8s ServiceAccount token (ADR-0005, security_implementation_architecture §3)
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "cybercom-backend"
    vault.hashicorp.com/agent-inject-secret-db: "database/creds/cybercom-backend"
automountServiceAccountToken: true
