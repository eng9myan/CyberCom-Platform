apiVersion: v1
kind: Service
metadata:
  name: cybercom-backend
  namespace: cybercom
  labels:
    app.kubernetes.io/name: cybercom-backend
    app.kubernetes.io/component: backend
spec:
  type: ClusterIP
  selector:
    app: cybercom-backend
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
