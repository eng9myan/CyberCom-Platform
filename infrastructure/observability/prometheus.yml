# =============================================================
# CyberCom Platform - Prometheus scrape configuration
# Deployed on OCI VM (il-jerusalem-1). Scrapes the Docker
# Compose services on the cybercom network.
# =============================================================

global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s
  external_labels:
    cluster: cybercom-oci
    region: il-jerusalem-1
    environment: production

# Alerting / rules files (mounted alongside this config)
rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  # Prometheus self-monitoring
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Backend API (FastAPI / prometheus-client at /metrics)
  - job_name: cybercom-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: api
          product: platform

  # Background workers (Celery exporter)
  - job_name: cybercom-worker
    static_configs:
      - targets: ["worker:9808"]
        labels:
          service: worker
          product: platform

  # Nginx reverse proxy (nginx-prometheus-exporter)
  - job_name: nginx
    static_configs:
      - targets: ["nginx-exporter:9113"]
        labels:
          service: nginx

  # PostgreSQL (postgres_exporter)
  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]
        labels:
          service: postgres

  # Redis (redis_exporter)
  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]
        labels:
          service: redis

  # Host / node metrics (node_exporter on the OCI VM)
  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          host: cybercom-web
