# CyberCom Prometheus Configuration. ADR-0009.
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: cybercom-local
    environment: development

rule_files:
  - "alerts/*.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "cybercom-backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics

  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8888"]

  - job_name: "kafka"
    static_configs:
      - targets: ["kafka:9101"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]
