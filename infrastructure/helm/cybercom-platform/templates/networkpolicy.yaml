{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .Release.Name }}-backend-policy
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  podSelector:
    matchLabels:
      app: {{ .Release.Name }}-backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow traffic from frontend and ingress controller
    - from:
        - podSelector:
            matchLabels:
              app: {{ .Release.Name }}-frontend
      ports:
        - protocol: TCP
          port: {{ .Values.backend.service.targetPort | default 8000 }}
  egress:
    # Allow egress to PostgreSQL and Redis DB pods
    - to:
        - podSelector:
            matchLabels:
              app: postgres
        - podSelector:
            matchLabels:
              app: {{ .Release.Name }}-redis
      ports:
        - protocol: TCP
          port: 5432
        - protocol: TCP
          port: 6379
{{- end }}
