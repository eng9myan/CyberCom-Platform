apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  # Base64 encoded defaults: username=cybercom_app, password=TemporarySecurePassword2026!
  username: {{ .Values.postgresql.auth.username | default "cybercom_app" | b64enc | quote }}
  password: {{ .Values.postgresql.auth.password | default "TemporarySecurePassword2026!" | b64enc | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-credentials
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  # Base64 encoded defaults: admin=admin, password=TemporarySecurePassword2026!
  admin-user: {{ .Values.keycloak.auth.adminUser | default "admin" | b64enc | quote }}
  password: {{ .Values.keycloak.auth.adminPassword | default "TemporarySecurePassword2026!" | b64enc | quote }}
