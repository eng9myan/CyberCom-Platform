apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  username: {{ required "postgresql.auth.username is required" .Values.postgresql.auth.username | b64enc | quote }}
  password: {{ required "postgresql.auth.password must be supplied via --set or a sealed secret — never use a default" .Values.postgresql.auth.password | b64enc | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-credentials
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  admin-user: {{ required "keycloak.auth.adminUser is required" .Values.keycloak.auth.adminUser | b64enc | quote }}
  password: {{ required "keycloak.auth.adminPassword must be supplied via --set or a sealed secret — never use a default" .Values.keycloak.auth.adminPassword | b64enc | quote }}
---
# Terminology API credentials - all fields are optional at launch.
# Set ICD11_API_TOKEN to enable live WHO ICD-11 search (obtain from https://icdaccessmanagement.who.int/).
# Override FHIR_TERMINOLOGY_SERVER to point at an internal FHIR tx server in production.
apiVersion: v1
kind: Secret
metadata:
  name: terminology-config
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
stringData:
  ICD11_API_TOKEN: {{ .Values.terminology.icd11ApiToken | default "" | quote }}
  FHIR_TERMINOLOGY_SERVER: {{ .Values.terminology.fhirTerminologyServer | default "https://tx.fhir.org/r4" | quote }}
