apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  username: {{ required "postgresql.auth.username is required" .Values.postgresql.auth.username | b64enc | quote }}
  password: {{ required "postgresql.auth.password must be supplied via --set or a sealed secret — never use a default" .Values.postgresql.auth.password | b64enc | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-credentials
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
type: Opaque
data:
  admin-user: {{ required "keycloak.auth.adminUser is required" .Values.keycloak.auth.adminUser | b64enc | quote }}
  password: {{ required "keycloak.auth.adminPassword must be supplied via --set or a sealed secret — never use a default" .Values.keycloak.auth.adminPassword | b64enc | quote }}
